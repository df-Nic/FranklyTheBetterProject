name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: OCBC-Banking/package-lock.json

      - name: Install Dependencies
        working-directory: OCBC-Banking
        run: npm ci

      - name: Export Web Build
        working-directory: OCBC-Banking
        run: npx expo export --platform web

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: OCBC-Banking/dist
          branch: gh-pages
